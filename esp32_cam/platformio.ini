[env:esp32cam]
; ✅ PRAGMATIC APPROACH: Uses standard espressif32 core with lightweight face detection
; NO COMPLEX DEPENDENCIES - Pure Arduino framework + esp32-camera
platform = espressif32@6.5.0
board = esp32cam
framework = arduino
monitor_speed = 115200

# Configuration de la mémoire (CRITIQUES pour la stabilité)
board_build.partitions = huge_app.csv

build_flags = 
    -D BOARD_HAS_PSRAM
    -mfix-esp32-psram-cache-issue
    -D _DISABLE_TLS_
    -D THINGER_EXTERNAL_CERTIFICATE

lib_deps = 
    thinger.io
    bblanchon/ArduinoJson @ ^6.21.3
    witnessmenow/UniversalTelegramBot
    https://github.com/espressif/esp32-camera.git
     
